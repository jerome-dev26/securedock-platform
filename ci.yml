name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (for frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./app/frontend

      - name: Install Backend Dependencies
        run: pip install -r requirements.txt
        working-directory: ./app/backend

      - name: Run Frontend Lint (Example)
        run: npm run lint
        working-directory: ./app/frontend
        continue-on-error: true # Adjust based on your linting strictness

      - name: Run Backend Lint (Example)
        run: flake8 .
        working-directory: ./app/backend
        continue-on-error: true # Adjust based on your linting strictness

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          publishDeployment: ${{ secrets.SEMGREP_DEPLOYMENT_ID }}
          # The Semgrep configuration to use. Can be a single rule, a list of rules, or a registry config.
          # For a comprehensive scan, consider using `semgrep ci` or a custom config.
          config: p/ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          SEMGREP_DEPLOYMENT_ID: ${{ secrets.SEMGREP_DEPLOYMENT_ID }}

      - name: Run Gitleaks Secret Scan
        uses: zricethezav/gitleaks-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .github/gitleaks.toml # Optional: path to custom gitleaks config
          # For pull requests, you might want to run against the diff
          # detect-secrets-in-diff: true

      - name: Run Hadolint (Dockerfile Linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.frontend
          # For multiple Dockerfiles, you can run this step multiple times or use a script

      - name: Run Trivy vulnerability scan (Frontend Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker/Dockerfile.frontend
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'HIGH,CRITICAL'
          # Exit code 1 if vulnerabilities are found, 0 otherwise
          exit-code: '1'

      - name: Run Trivy vulnerability scan (Backend Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker/Dockerfile.backend
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload SARIF file to GitHub Security tab (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif

      - name: Upload SARIF file to GitHub Security tab (Backend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif

      - name: Build Docker Images
        run: |
          docker build -t securedock-frontend -f docker/Dockerfile.frontend .
          docker build -t securedock-backend -f docker/Dockerfile.backend .

      # Optional: Run unit tests here
      # - name: Run Frontend Tests
      #   run: npm test
      #   working-directory: ./app/frontend

      # - name: Run Backend Tests
      #   run: pytest
      #   working-directory: ./app/backend

