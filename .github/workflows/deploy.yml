name: CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: securedock-frontend
  IMAGE_NAME_BACKEND: securedock-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==================== FRONTEND ====================
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}

      - name: Build and push Frontend
        id: push-frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      # ==================== BACKEND ====================
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}

      - name: Build and push Backend
        id: push-backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      # ==================== Cosign Signing & SBOM ====================
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign Frontend Image with Cosign (Traditional Key)
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}@${{ steps.push-frontend.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Generate SBOM for Frontend
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}@${{ steps.push-frontend.outputs.digest }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Sign Backend Image with Cosign (Traditional Key)
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}@${{ steps.push-backend.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Generate SBOM for Backend
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}@${{ steps.push-backend.outputs.digest }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      # ==================== Deploy to EC2 ====================


           # ==================== Deploy to EC2 ====================
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 5m
          debug: false
          script: |
            echo "🔄 Starting deployment..."

            # Create directory if it doesn't exist
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/securedock-platform

            # Go to the project directory
            cd /home/${{ secrets.EC2_USERNAME }}/securedock-platform

            # Clone or pull latest code (recommended approach)
            if [ ! -d ".git" ]; then
              echo "📥 Cloning repository for the first time..."
              git clone https://github.com/${{ github.repository_owner }}/securedock-platform.git .
            else
              echo "⬇️  Pulling latest changes..."
              git pull origin main
            fi

            # Make sure deploy script exists and is executable
            chmod +x scripts/deploy.sh

            # Run the deployment script
            echo "🚀 Running deployment script..."
            ./scripts/deploy.sh \
              ${{ github.repository_owner }} \
              ${{ env.IMAGE_NAME_FRONTEND }} \
              ${{ env.IMAGE_NAME_BACKEND }} \
              ${{ github.sha }} \
              ${{ secrets.DOMAIN_NAME }}

            echo "✅ Deployment completed successfully!"
