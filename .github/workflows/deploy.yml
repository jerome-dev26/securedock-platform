name: CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*' # Push events to v1.0.0, v2.0.0, etc. tags

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: securedock-frontend
  IMAGE_NAME_BACKEND: securedock-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # To push images to GHCR
      id-token: write # For Sigstore/Cosign

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker images
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}

      - name: Build and push Docker image (Frontend)
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Generate Frontend Image Attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}
          subject-digest: ${{ steps.push-frontend.outputs.digest }}
          push-to-registry: true

      - name: Sign Frontend Image with Cosign
        uses: sigstore/cosign-installer/upload-cosign-artifact@v3.0.6
        with:
          cosign-release: v2.2.0
          artifact: ${{ steps.push-frontend.outputs.digest }}
          # Your Cosign key/password would be configured here via secrets
          # cosign-key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          # cosign-password: ${{ secrets.COSIGN_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker images
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}

      - name: Build and push Docker image (Backend)
        id: push-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Generate Backend Image Attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}
          subject-digest: ${{ steps.push-backend.outputs.digest }}
          push-to-registry: true

      - name: Sign Backend Image with Cosign
        uses: sigstore/cosign-installer/upload-cosign-artifact@v3.0.6
        with:
          cosign-release: v2.2.0
          artifact: ${{ steps.push-backend.outputs.digest }}
          # Your Cosign key/password would be configured here via secrets
          # cosign-key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          # cosign-password: ${{ secrets.COSIGN_PASSWORD }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/securedock-platform
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh ${{ github.repository_owner }} ${{ env.IMAGE_NAME_FRONTEND }} ${{ env.IMAGE_NAME_BACKEND }} ${{ github.sha }} ${{ secrets.DOMAIN_NAME }}
