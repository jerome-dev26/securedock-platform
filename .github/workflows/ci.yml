name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed for SBOM artifact upload
      security-events: write   # Needed for SARIF upload (Trivy)
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Run Backend Lint (Flake8)
        run: pip install flake8 && flake8 app/backend/

      - name: Run Frontend Lint (placeholder)
        run: echo "Frontend linting placeholder"

      - name: Run SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          publishDeployment: ${{ secrets.SEMGREP_DEPLOYMENT_ID }}

      - name: Run Secret Scanning with Gitleaks
        uses: zricethezav/gitleaks-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hadolint (Dockerfile linting)
        uses: reviewdog/action-hadolint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: nofilter
          hadolint_flags: "--no-fail docker/Dockerfile.frontend docker/Dockerfile.backend"

      # Build Docker images with explicit tags
      - name: Build Docker Images
        run: |
          docker build -t securedock-frontend:${{ github.sha }} -f docker/Dockerfile.frontend .
          docker build -t securedock-backend:${{ github.sha }} -f docker/Dockerfile.backend .

      # ==================== Trivy Vulnerability Scan (Fixed) ====================
      - name: Run Trivy vulnerability scan (Frontend)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'securedock-frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'          # Fail the build on HIGH/CRITICAL findings (optional)

      - name: Upload Trivy results to GitHub Security tab (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend-results.sarif'

      - name: Run Trivy vulnerability scan (Backend)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'securedock-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab (Backend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend-results.sarif'

      # ==================== SBOM Generation ====================
      - name: Generate SBOM for Frontend
        uses: anchore/sbom-action@v0
        with:
          image: securedock-frontend:${{ github.sha }}
          format: spdx-json
          output-file: sbom-frontend.spdx.json

      - name: Generate SBOM for Backend
        uses: anchore/sbom-action@v0
        with:
          image: securedock-backend:${{ github.sha }}
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            sbom-frontend.spdx.json
            sbom-backend.spdx.json
