version: '3.8'

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/securedock-frontend:${GITHUB_SHA}
    networks:
      - securedock-network
    restart: always

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/securedock-backend:${GITHUB_SHA}
    networks:
      - securedock-network
    restart: always

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certificates here in production
      # - /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - frontend
      - backend
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    networks:
      - securedock-network
    restart: always

networks:
  securedock-network:
    driver: bridge
