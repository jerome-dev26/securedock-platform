version: '3.8'

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/securedock-frontend:${GITHUB_SHA}
    restart: always
    environment:
      API_URL: https://${DOMAIN_NAME}/api

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/securedock-backend:${GITHUB_SHA}
    restart: always
    environment:
      DATABASE_URL: sqlite:///./sql_app.db # Or a more robust solution like PostgreSQL
      # Add other production environment variables here

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt # For Certbot managed SSL certificates
    depends_on:
      - frontend
      - backend
